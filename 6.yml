version: "3"

services:
  mongodb:
    image: mongo
    container_name: mongo_db
    ports:
      - "27018:27017"

  model:
    build: ./model
    ports:
      - "5001:5000"
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    ports:
      - "8081:80"
    depends_on:
      - model
